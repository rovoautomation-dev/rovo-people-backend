version: "3.9"

services:
  mongodb:
    image: mongo:7.0
    container_name: rovo-people-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-secret}
      MONGO_INITDB_DATABASE: ${MONGO_DB_NAME:-rovo-people}
    ports:
      - "37017:27017"
    volumes:
      - mongo_data:/data/db
      - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - rovo-people-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 20s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rovo-people-app
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5005:5005"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - rovo-people-network

volumes:
  mongo_data:
    driver: local

networks:
  rovo-people-network:
    driver: bridge
