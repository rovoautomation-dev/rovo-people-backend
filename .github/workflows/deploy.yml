name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: SSH Deploy to Production Server
    runs-on: ubuntu-latest

    steps:
      #1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      #2. Setup SSH key and known_hosts
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      #3. Deploy via SSH
      - name: Deploy to server
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'ENDSSH'

            set -e

            echo "=============================="
            echo " Starting deployment..."
            echo "=============================="

            # Navigate to the deployment directory
            cd /var/www/rovo/rovo-people-prod

            # Pull latest code
            git pull origin main

            # Write production .env from GitHub Secret
            echo "$PROD_ENV" > .env

            # Rebuild and restart all containers
            # --build   → rebuilds the app image with latest code
            # --no-deps → only rebuilds 'app', keeps mongodb data intact
            docker compose build --no-cache app
            docker compose up -d

            # Wait for app container to be running
            echo "Waiting for app to be ready..."
            for i in {1..20}; do
              STATUS=$(docker inspect --format='{{.State.Status}}' rovo-people-app 2>/dev/null || echo "missing")
              if [ "$STATUS" = "running" ]; then
                echo "App container is running!"
                break
              fi
              echo "  attempt $i/20 (status: $STATUS)..."
              sleep 3
            done

            # Show last 20 log lines for visibility
            docker compose logs --tail=20 app

            echo "=============================="
            echo " Deployment complete!"
            echo "=============================="

          ENDSSH
        env:
          PROD_ENV: ${{ secrets.PROD_ENV }}

      # 4. Health check
      - name: Health check
        run: |
          sleep 10
          curl --fail --silent --show-error \
            http://${{ secrets.SERVER_HOST }}:5005/api/health \
            || (echo "Health check failed!" && exit 1)
          echo "Health check passed!"
